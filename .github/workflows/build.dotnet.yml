name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Check Out Repo
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore NuGet packages
              run: dotnet restore ConsistencyClass.slnx

            - name: Build
              run: dotnet build ConsistencyClass.slnx --configuration Release --no-restore

            - name: Run tests
              run: dotnet test ConsistencyClass.slnx --configuration Release --no-build --filter Category!=SkipCI

